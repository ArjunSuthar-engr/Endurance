<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Continuumm Orb Logo</title>
  <desc id="logoDesc">Backgroundless cinematic orb symbol.</desc>
  <defs>
    <radialGradient id="orb-core" cx="44%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#2a4860" />
      <stop offset="64%" stop-color="#203a53" />
      <stop offset="100%" stop-color="#172b3b" />
    </radialGradient>
    <linearGradient id="orb-sheen" x1="24%" x2="76%" y1="14%" y2="86%">
      <stop offset="0%" stop-color="#ebb15f" stop-opacity=".5" />
      <stop offset="52%" stop-color="#d88445" stop-opacity=".18" />
      <stop offset="100%" stop-color="#1f5aff" stop-opacity=".44" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd677" stop-opacity=".44" />
      <stop offset="58%" stop-color="#8d72ff" stop-opacity=".2" />
      <stop offset="100%" stop-color="#2a65ff" stop-opacity="0" />
    </radialGradient>
    <filter id="halo-blur" x="22" y="22" width="212" height="212" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="10" />
    </filter>
    <clipPath id="orb-cut">
      <circle cx="128" cy="128" r="76" />
    </clipPath>
  </defs>

  <g filter="url(#halo-blur)">
    <circle cx="128" cy="128" r="86" fill="url(#halo)" />
  </g>

  <circle cx="128" cy="128" r="76" fill="url(#orb-core)" />

  <g clip-path="url(#orb-cut)" opacity=".9">
    <path d="M44 184c34-32 78-43 168-45v68H44Z" fill="url(#orb-sheen)" />
    <path d="M38 136c46-23 97-25 184-21v25c-67-5-126-3-184 12Z" fill="#f2c06a" fill-opacity=".14" />
    <path d="M58 86c32 20 62 54 84 116h-20c-19-50-43-81-76-108Z" fill="#7f98ff" fill-opacity=".2" />
  </g>
</svg>

